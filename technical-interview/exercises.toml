task = '''Implement the following bit manipulation operations:
  1) Clear the lowest set bit of x
  2) Right-propagate the lowest set bit of x
  3) Extract the lowest set bit of x
  4) Clear all bits from LSB to the i-th bit (inclusive)
  5) Clear all bits from MSB to the i-th bit (inclusive)
  6) Divide by 2 and multiply by 2
  7) Upper → lower and lower → upper case conversion (ASCII trick)
