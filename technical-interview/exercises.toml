[[exercises]]
level = "data-structures"
task = "Implement a Singly Linked List from scratch. Include: node definition, append, prepend, delete by value, and traversal."
hint = '''
Node: value + next pointer (next = None by default)
LinkedList: head pointer (head = None by default)

append(val):   walk to tail (while node.next), set tail.next = new Node
prepend(val):  new_node.next = self.head; self.head = new_node
delete(val):   track prev; when node.val == val set prev.next = node.next
traverse():    start at head, walk .next until None

Edge cases: empty list, deleting the head node, deleting a non-existent value.
'''

[[exercises]]
level = "data-structures"
task = "Reverse a Singly Linked List, both iteratively and recursively."
hint = '''
Iterative (3 pointers):
  prev = None
  while curr:
    next_node = curr.next
    curr.next = prev
    prev = curr
    curr = next_node
  return prev   (new head)

Recursive:
  if not head or not head.next: return head
  new_head = reverse(head.next)
  head.next.next = head
  head.next = None
  return new_head

Time O(n), Space O(1) iterative / O(n) recursive (call stack).
'''

[[exercises]]
level = "data-structures"
task = "Implement an array-based Fixed-Capacity Queue. Include: enqueue, dequeue, peek, is_empty, is_full."
hint = '''
Use a circular buffer: array of size capacity, head and tail indices, size counter.

enqueue(val):  if full raise; arr[tail] = val; tail = (tail+1) % cap; size += 1
dequeue():     if empty raise; val = arr[head]; head = (head+1) % cap; size -= 1
peek():        return arr[head]
is_full():     size == capacity
is_empty():    size == 0

Circular indexing prevents needing to shift elements on dequeue.
'''

[[exercises]]
level = "data-structures"
task = '''Implement an array-based Hash Table with:
  - A hash function
  - insert(key, value)
  - lookup(key)
  - remove(key)
  - Collision resolution via chaining with doubly linked lists
  - Dynamic resizing when load factor exceeds a threshold'''
hint = '''
hash(key):     sum(ord(c) * 31^i for i, c in enumerate(key)) % capacity
               (polynomial rolling hash)

Each bucket: a doubly linked list of (key, value) nodes.

insert(k, v):  idx = hash(k); walk chain to check for existing key (update) or append new node
lookup(k):     idx = hash(k); walk chain for matching key
remove(k):     idx = hash(k); find node, unlink it from doubly linked list

Resize trigger: load_factor = num_items / capacity > 0.7
Resize:        new capacity = 2 * old capacity; rehash all entries

Load factor goal: keep between 0.3 and 0.7 for O(1) average operations.
'''

[[exercises]]
level = "data-structures"
task = "Implement a Graph using an Adjacency List. Write BFS and DFS traversal methods."
hint = '''
Representation: dict mapping each node -> list of neighbors
  graph = defaultdict(list)
  graph[u].append(v)   (and graph[v].append(u) for undirected)

BFS (iterative — queue):
  visited = set(); queue = deque([start])
  while queue: node = queue.popleft(); visit; add unvisited neighbors

DFS (recursive):
  visited = set()
  def dfs(node): visit; for n in graph[node]: if n not in visited: dfs(n)

DFS (iterative — stack):
  visited = set(); stack = [start]
  while stack: node = stack.pop(); if not visited: visit; push neighbors

BFS = shortest path in unweighted graph. DFS = cycle detection, topological sort.
'''

[[exercises]]
level = "data-structures"
task = "Implement a Trie (prefix tree) from scratch. Include: insert, search (exact), and starts_with (prefix search)."
hint = '''
TrieNode: children = {} (or array[26]), is_end = False
Trie: root = TrieNode()

insert(word):
  node = root
  for ch in word: node = node.children.setdefault(ch, TrieNode())
  node.is_end = True

search(word):
  node = root
  for ch in word: if ch not in node.children: return False; node = node.children[ch]
  return node.is_end

starts_with(prefix):
  node = root
  for ch in prefix: if ch not in node.children: return False; node = node.children[ch]
  return True

Time O(m) per operation where m = word length. Space O(total characters inserted).
'''

[[exercises]]
level = "data-structures"
task = "Given a list of items, return: (1) all possible permutations, and (2) all possible subsets (power set)."
hint = '''
Permutations (backtracking):
  def perms(arr, current=[]):
    if len(current) == len(arr): result.append(current[:])
    for i, x in enumerate(arr):
      if i not in used: used.add(i); current.append(x); perms(arr); current.pop(); used.remove(i)
  n! permutations total.

Subsets (backtracking or bitmask):
  Backtracking:
    def subsets(i, current):
      result.append(current[:])
      for j in range(i, len(arr)): current.append(arr[j]); subsets(j+1, current); current.pop()

  Bitmask: for mask in range(2**n): subset = [arr[i] for i in range(n) if mask & (1<<i)]

  2^n subsets total. Both approaches O(n * 2^n) time.
'''

