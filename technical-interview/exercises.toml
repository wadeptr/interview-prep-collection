  12) Reverse all bits of x'''
hint = '''
1)  x & (x - 1)            — clears lowest set bit
2)  x | (x - 1)            — right-propagates lowest set bit
3)  x & (-x)               — isolates lowest set bit
4)  x & ~((1 << (i+1)) - 1)
5)  x & ((1 << i) - 1)
6)  x >> 1  (div by 2),  x << 1  (mul by 2)
7)  upper->lower: ch | 0x20   lower->upper: ch & ~0x20  (bit 5 trick)
8)  Brian Kernighan: count = 0; while x: x &= x-1; count += 1
9)  x > 0 and (x & (x-1)) == 0
10) def pow(x, y): return 1 if y==0 else x * pow(x, y-1)   (or iterative)
11) if ((x >> i) & 1) != ((x >> j) & 1): x ^= (1 << i) | (1 << j)
12) result = 0
    for _ in range(32): result = (result << 1) | (x & 1); x >>= 1
'''

[[exercises]]
level = "algorithms"
task = '''Find the kth smallest element in an unsorted list using four different approaches:
  1) Sorting
  2) Min-heap and Max-heap
  3) QuickSelect
  4) Median of Medians'''
hint = '''
1) Sort + index:  sorted(arr)[k-1]    — O(n log n)

2) Min-heap:  heapify(arr); pop k times  — O(n + k log n)
   Max-heap of size k:  push each element; if heap size > k pop max
   Final heap top = kth smallest  — O(n log k)

3) QuickSelect (avg O(n)):
   partition like quicksort; recurse only on the side containing index k-1
   if pivot_idx == k-1: return arr[pivot_idx]
   elif pivot_idx < k-1: search right
   else: search left

4) Median of Medians (guaranteed O(n)):
   - Split into groups of 5
   - Find median of each group
   - Recursively find median of those medians (the "pivot")
   - Partition around the pivot
   - Recurse on correct partition
   Guarantees at least 30% of elements on each side of the pivot.
'''
