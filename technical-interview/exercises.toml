[[exercises]]
level = "algorithms"
task = "Implement Binary Search both recursively and iteratively on a sorted array."
hint = '''
Iterative:
  lo, hi = 0, len(arr) - 1
  while lo <= hi:
    mid = (lo + hi) // 2
    if arr[mid] == target: return mid
    elif arr[mid] < target: lo = mid + 1
    else: hi = mid - 1
  return -1

Recursive:
  def bs(lo, hi):
    if lo > hi: return -1
    mid = (lo + hi) // 2
    if arr[mid] == target: return mid
    elif arr[mid] < target: return bs(mid+1, hi)
    else: return bs(lo, mid-1)

Time O(log n), Space O(1) iterative / O(log n) recursive.
'''

[[exercises]]
level = "algorithms"
task = "Write Merge Sort."
hint = '''
def mergesort(arr):
  if len(arr) <= 1: return arr
  mid = len(arr) // 2
  left = mergesort(arr[:mid])
  right = mergesort(arr[mid:])
  return merge(left, right)

def merge(left, right):
  result = []; i = j = 0
  while i < len(left) and j < len(right):
    if left[i] <= right[j]: result.append(left[i]); i += 1
    else: result.append(right[j]); j += 1
  return result + left[i:] + right[j:]

Time O(n log n) all cases. Space O(n). Stable sort.
'''

[[exercises]]
level = "algorithms"
task = "Write Quicksort."
hint = '''
def quicksort(arr, lo, hi):
  if lo < hi:
    p = partition(arr, lo, hi)
    quicksort(arr, lo, p - 1)
    quicksort(arr, p + 1, hi)

def partition(arr, lo, hi):   # Lomuto scheme
  pivot = arr[hi]
  i = lo - 1
  for j in range(lo, hi):
    if arr[j] <= pivot: i += 1; arr[i], arr[j] = arr[j], arr[i]
  arr[i+1], arr[hi] = arr[hi], arr[i+1]
  return i + 1

Time O(n log n) average, O(n^2) worst (bad pivot). Space O(log n) avg.
Unstable sort. Use random pivot selection to avoid worst case.
'''

