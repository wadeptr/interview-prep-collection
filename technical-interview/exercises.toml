level = "algorithms"
task = "Print a binary tree using DFS in-order traversal — both recursively and iteratively."
hint = '''
In-order: LEFT → ROOT → RIGHT  (gives sorted order for a BST)

Recursive:
  def inorder(node):
    if node:
      inorder(node.left)
      print(node.val)
      inorder(node.right)

Iterative (explicit stack):
  stack = []; curr = root
  while curr or stack:
    while curr: stack.append(curr); curr = curr.left
    curr = stack.pop()
    print(curr.val)
    curr = curr.right
'''

[[exercises]]
level = "algorithms"
task = "Print a binary tree using DFS pre-order traversal — both recursively and iteratively."
hint = '''
Pre-order: ROOT → LEFT → RIGHT  (useful for serializing / copying a tree)

Recursive:
  def preorder(node):
    if node:
      print(node.val)
      preorder(node.left)
      preorder(node.right)

Iterative (stack):
  stack = [root]
  while stack:
    node = stack.pop()
    if node:
      print(node.val)
      stack.append(node.right)   # right pushed first so left is processed first
      stack.append(node.left)
'''

[[exercises]]
level = "algorithms"
task = "Print a binary tree using DFS post-order traversal — both recursively and iteratively."
hint = '''
Post-order: LEFT → RIGHT → ROOT  (useful for deleting a tree, evaluating expression trees)

Recursive:
  def postorder(node):
    if node:
      postorder(node.left)
      postorder(node.right)
      print(node.val)

Iterative (two-stack approach):
  s1, s2 = [root], []
  while s1:
    node = s1.pop(); s2.append(node)
    if node.left:  s1.append(node.left)
    if node.right: s1.append(node.right)
  while s2: print(s2.pop().val)
'''

[[exercises]]
level = "algorithms"
task = "Implement cycle detection for both a directed graph and an undirected graph."
hint = '''
Directed (DFS with rec_stack):
  visited = set(); rec_stack = set()
  def has_cycle(node):
    visited.add(node); rec_stack.add(node)
    for neighbor in graph[node]:
      if neighbor not in visited and has_cycle(neighbor): return True
      if neighbor in rec_stack: return True
    rec_stack.remove(node)
    return False
  rec_stack tracks nodes in the current DFS path (back edge = cycle).

Undirected (DFS with parent tracking):
  def has_cycle(node, parent, visited):
    visited.add(node)
    for neighbor in graph[node]:
      if neighbor not in visited:
        if has_cycle(neighbor, node, visited): return True
      elif neighbor != parent: return True   # back edge to non-parent
    return False
'''

[[exercises]]
level = "algorithms"
task = "Implement Topological Sort on a directed acyclic graph (DAG) — both recursively (DFS) and iteratively (Kahn's algorithm)."
hint = '''
DFS (post-order, reverse):
  visited = set(); result = []
  def dfs(node):
    visited.add(node)
    for neighbor in graph[node]:
      if neighbor not in visited: dfs(neighbor)
    result.append(node)
  for node in graph: if node not in visited: dfs(node)
  return result[::-1]

Kahn's (BFS, in-degree):
  compute in_degree for every node
  queue = deque([n for n in graph if in_degree[n] == 0])
  while queue:
    node = queue.popleft(); result.append(node)
    for neighbor in graph[node]:
      in_degree[neighbor] -= 1
      if in_degree[neighbor] == 0: queue.append(neighbor)
  if len(result) != len(graph): cycle detected (not a DAG)
'''

